<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#ff2d78" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Base Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" filter="url(#shadow)" />

  <!-- Inner stylized magnifying glass / eye -->
  <circle cx="256" cy="216" r="80" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" />
  <circle cx="256" cy="216" r="30" fill="#ffffff" />
  
  <!-- The handle of the magnifying glass (forming an 'I' or 'V' intersection) -->
  <path d="M 312 272 L 372 352" stroke="#ffffff" stroke-width="40" stroke-linecap="round" />
  
  <!-- Decorative AI Sparkles -->
  <path d="M 120 160 L 140 180 M 140 140 L 120 180" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.8" />
  <circle cx="130" cy="160" r="14" fill="#ffffff" />
  
  <circle cx="100" cy="220" r="8" fill="#ffffff" opacity="0.6" />
  <circle cx="400" cy="140" r="10" fill="#ffffff" opacity="0.7" />
</svg>
